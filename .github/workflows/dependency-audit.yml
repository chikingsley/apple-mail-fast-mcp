name: Dependency audit

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.14
      - run: uv --preview-features audit-command audit --locked
